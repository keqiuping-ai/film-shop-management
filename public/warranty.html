<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <title>QUAD FILM 门店施工质保查询</title>
  <link rel="icon" href="/quad-film-icon.png" />
  <link rel="stylesheet" href="/warranty.css?v=1" />
</head>
<body>
  <main class="shell">
    <header class="brand">
      <img src="/quad-film-icon.png" alt="QUAD FILM" />
      <div><span>QUAD FILM</span><h1>门店施工质保查询</h1><p>Store Installation Warranty Lookup</p></div>
    </header>
    <section class="lookup-card" id="lookupCard">
      <div class="shield">◆</div>
      <h2>查询您的车辆施工质保</h2>
      <p>请输入施工登记时使用的客户姓名和手机号。两项完全匹配后，才会显示质保资料。</p>
      <form id="lookupForm">
        <label>客户姓名 / Customer name<input id="customerName" maxlength="120" autocomplete="name" required placeholder="请输入完整姓名" /></label>
        <label>手机号 / Phone number<input id="phone" maxlength="40" inputmode="tel" autocomplete="tel" required placeholder="请输入登记手机号" /></label>
        <button id="lookupButton" type="submit">查询质保</button>
      </form>
      <div id="lookupMessage" class="message" role="status"></div>
      <p class="privacy">为保护客户隐私，本页面不会显示客户名单，也不支持模糊查询。</p>
    </section>
    <section id="results" class="results" hidden></section>
    <footer class="site-footer"><strong>QUAD FILM</strong><span>门店施工质保 / Store Installation Warranty</span></footer>
  </main>
  <script src="/warranty.js?v=1"></script>
</body>
</html>
